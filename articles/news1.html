<h1>'Fingers on the trigger': Deadly warnings for Iranians being urged to take action</h1>

<p>このニュースは、イランの警察トップが国民に向けて厳しい警告を出したという内容です。

イランの警察長官は、「敵の指示で」街に出てデモや抗議行動を行う人々を敵とみなし、厳しく対応すると宣言しました。つまり、政府に反対する行動をすると敵と見なされ、強い処置が取られるという警告です。

この発言は、イランでの抗議活動やデモが続く中で、市民に対して行動を控えるよう促す意図があると考えられます。</p>
