<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLD NEWS TOUR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <section class="hero">

<div class="hero-overlay"></div>

<!-- 左キャラ -->
<img src="./images/yui.png" class="hero-yui">

<!-- 右キャラ -->
<img src="./images/taka.png" class="hero-taka">

<div class="hero-content">
<h1 class="hero-title">WORLD NEWS TOUR</h1>
<p class="hero-subtitle">世界の出来事をやさしく理解する</p>
</div>

<!-- 吹き出し -->
<div class="balloon balloon-left">
最近ニュースが<br>騒がしいね
</div>

<div class="balloon balloon-top">
実は全部つながってるんだ
</div>

<div class="balloon balloon-bottom">

</div>

<a href="#news" class="hero-button">
世界のニュースを見てみる
</a>

<div class="hero-arrow">▼</div>

</section>

    <!-- キャラクター -->
    <img src="./images/yui.png" alt="ユイ" class="hero-yui">
    <img src="./images/taka.png" alt="タカ" class="hero-taka">

    <!-- タイトル -->
    <div class="hero-content">
      <h1 class="hero-title">WORLD NEWS TOUR</h1>
      <p class="hero-subtitle">世界の出来事をやさしく理解する</p>
    </div>

    <!-- 吹き出し -->
    <div class="hero-balloons">
      <div class="balloon balloon-left">
        最近ニュースが<br>騒がしいね
      </div>

      <div class="balloon balloon-top">
        実は全部つながってるんだ
      </div>

        え？どういうこと？
      </div>

    <div class="hero-arrow">▼</div>
  </section>

  <section id="news" class="dummy-news">

  </section>

</html>
