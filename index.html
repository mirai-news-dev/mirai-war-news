<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>戦争と日本経済ニュース</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

#mirai{
position:fixed;
bottom:20px;
left:0;
width:120px;
z-index:9999;
transition:0.2s;
}

.jump{
transform:translateY(-150px);
}

.crouch{
transform:scaleY(0.6);
}

.punch{
transform:translateX(50px);
}

</style>

</head>

<body>

<h1>戦争と日本経済ニュース</h1>

<p>ミライAIニュース解説</p>

<!-- ミライ -->

<img id="mirai" src="images/mirai_idle.png">

<!-- 画面割れ -->

<img id="crack"
src="https://i.imgur.com/6QKQw7G.png"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998">

<!-- 割れる音 -->

<audio id="glass"
src="https://assets.mixkit.co/sfx/preview/mixkit-breaking-glass-284.mp3"></audio>

<script>

const mirai=document.getElementById("mirai")
const crack=document.getElementById("crack")
const glass=document.getElementById("glass")

let x=0
let dir=1
let frame=0
let clickCount=0

const walkFrames=[
"images/mirai_walk1.png",
"images/mirai_walk2.png"
]

function walk(){

x+=2*dir

if(x>window.innerWidth-120) dir=-1
if(x<0) dir=1

mirai.style.left=x+"px"

frame=(frame+1)%walkFrames.length
mirai.src=walkFrames[frame]

}

setInterval(walk,200)

mirai.onclick=function(){

clickCount++

/* ジャンプ */

if(clickCount<=3){

mirai.src="images/mirai_jump.png"
mirai.classList.add("jump")

setTimeout(()=>{

mirai.classList.remove("jump")
mirai.src="images/mirai_idle.png"

},400)

}

/* しゃがむ */

else if(clickCount<=5){

mirai.src="images/mirai_crouch.png"
mirai.classList.add("crouch")

setTimeout(()=>{

mirai.classList.remove("crouch")
mirai.src="images/mirai_idle.png"

},400)

}

/* 注意 */

else if(clickCount<=7){

alert("ミライ：しつこいよ！")

}

/* パンチ → 画面割れ */

else{

mirai.src="images/mirai_angry.png"

mirai.classList.add("punch")

setTimeout(()=>{

crack.style.display="block"
glass.play()

},200)

setTimeout(()=>{

crack.style.display="none"

mirai.classList.remove("punch")
mirai.src="images/mirai_idle.png"

clickCount=0

},1500)

}

}

</script>

</body>
</html>
