}

<script>

const mirai = document.getElementById("mirai")

let x = 0
let direction = 1

function walk(){

x += 5 * direction

if(x > window.innerWidth - 100){
direction = -1
}

if(x < 0){
direction = 1
}

mirai.style.left = x + "px"

}

setInterval(walk,80)

mirai.onclick = function(){

let r = Math.random()

// ジャンプ
if(r < 0.33){

mirai.classList.add("jump")

setTimeout(()=>{
mirai.classList.remove("jump")
},400)

}

// しゃがむ
else if(r < 0.66){

mirai.classList.add("crouch")

setTimeout(()=>{
mirai.classList.remove("crouch")
},400)

}

// 画面割れ
else{

document.body.style.background="black"

alert("ミライが画面を壊した！？😲")

setTimeout(()=>{
document.body.style.background="#0f172a"
},500)

}

}

</script>
