<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLD NEWS TOUR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <div class="hero-overlay"></div>

    <!-- 左キャラグループ -->
    <div class="character-group yui-group">
      <img src="./images/yui.png" alt="ユイ" class="hero-yui">
      <div class="balloon balloon-left">
        最近ニュースが<br>騒がしいね
      </div>
    </div>

    <!-- 右キャラグループ -->
    <div class="character-group taka-group">
      <img src="./images/taka.png" alt="タカ" class="hero-taka">
      <div class="balloon balloon-top">
        実は全部つながってるんだ
      </div>
    </div>

    <!-- タイトル -->
    <div class="hero-content">
      <h1 class="hero-title">WORLD NEWS TOUR</h1>
      <p class="hero-subtitle">世界の出来事をやさしく理解する</p>
    </div>

    <!-- 真ん中の吹き出し -->
    <div class="balloon balloon-bottom">
      え？どういうこと？
    </div>

    <!-- ボタン -->
    <a href="#news" class="hero-button">
      世界のニュースを見てみる
    </a>

    <!-- 下矢印 -->
    <div class="hero-arrow">▼</div>
  </section>

  <section id="news" class="dummy-news">
    <h2>今日のニュース</h2>
  </section>

</body>
</html>
