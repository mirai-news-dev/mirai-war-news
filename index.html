<body>

<p id="quiz"></p>

<button onclick="newQuiz()">次のクイズ</button>

</div>

---

<div id="chatbox">

<p><b>ミライAI</b></p>

<input id="userInput" placeholder="ニュース質問">

<button onclick="askAI()">質問</button>

<p id="aiResponse"></p>

</div>

<!-- ミライ2Dキャラ -->

<img id="mirai" src="https://i.imgur.com/Z6XbK8C.png">

<script>

const mirai=document.getElementById("mirai")

let x=0
let direction=1

function walk(){

x+=3*direction

if(x>window.innerWidth-140){
direction=-1
}

if(x<0){
direction=1
}

mirai.style.left=x+"px"

}

setInterval(walk,100)

mirai.onclick=function(){

let box=document.getElementById("chatbox")

if(box.style.display=="none"){
box.style.display="block"
}else{
box.style.display="none"
}

mirai.classList.add("jump")

setTimeout(()=>{
mirai.classList.remove("jump")
},300)

}

function askAI(){

let q=document.getElementById("userInput").value

document.getElementById("aiResponse").innerText=
"ミライ：そのニュースは世界情勢に影響する重要な話題だよ！"

}

const quizList=[

"戦争が起きると上がりやすいものは？",

"世界ニュースは日本経済に影響する？",

"エネルギー価格は何に影響する？"

]

function newQuiz(){

let r=Math.floor(Math.random()*quizList.length)

document.getElementById("quiz").innerText=quizList[r]

}

newQuiz()

</script>
