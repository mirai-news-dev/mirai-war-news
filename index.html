<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORLD NEWS TOUR</title>

  <!-- キャッシュ対策付き -->
  <link rel="stylesheet" href="style.css?v=2" />
</head>

<body>

<header class="header">
  <div class="container header-inner">

    <div class="logo">
      WORLD NEWS TOUR
    </div>

    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">ニュース</a>
      <a href="#">年歴</a>
    </nav>

    <div class="auth">
      <a href="#">ログイン</a>
      <a href="#" class="btn">登録</a>
    </div>

  </div>
</header>

<section class="hero">
  <div class="hero-inner container">

    <div class="hero-text">
      <h1>世界ニュースを<br>やさしく理解する</h1>
      <p>難しい世界の話を、物語で。</p>
      <a class="main-btn">ニュースを見る</a>
    </div>

    <div class="hero-img boy"></div>
    <div class="hero-img girl"></div>

    <div class="bubble left">
      最近ニュース難しいよね…
    </div>

    <div class="bubble right">
      実は全部つながってるんだ
    </div>

  </div>
</section>

<section class="news container">
  <h2>今日のニュース</h2>

  <div class="cards">

    <div class="card">
      <div class="img"></div>
      <h3>原油価格が上昇</h3>
      <p>ガソリンに影響する？</p>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>中国経済の減速</h3>
      <p>日本企業に影響</p>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>戦争リスク</h3>
      <p>物価に波及</p>
    </div>

  </div>
</section>

</body>
</html>
