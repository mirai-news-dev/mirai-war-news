<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLD NEWS TOUR</title>

  <!-- キャッシュ対策 -->
  <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

<!-- ========================
  ヘッダー
  ※右上ログインここ
======================== -->
<header class="header">
  <div class="container header-inner">

    <div class="logo">
      WORLD NEWS TOUR
    </div>

    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">ニュース</a>
      <a href="#">年歴</a>
    </nav>

    <div class="auth">
      <a href="#">ログイン</a>
      <a href="#" class="btn">登録</a>
    </div>

  </div>
</header>

<!-- ========================
  ヒーロー（最重要）
======================== -->
<section class="hero">

  <!-- タイトル -->
  <div class="hero-title">
    WORLD NEWS TOUR
    <span>世界の出来事をやさしく理解する</span>
  </div>

  <!-- キャラ -->
  <div class="character boy"></div>
  <div class="character girl"></div>

  <!-- 吹き出し -->
  <div class="bubble bubble-left">
    最近ニュースが難しいね
  </div>

  <div class="bubble bubble-center">
    実は全部つながってるんだ
  </div>

  <div class="bubble bubble-right">
    え？どういうこと？
  </div>

  <!-- ボタン -->
  <div class="hero-btn">
    世界のニュースを見る →
  </div>

</section>

<!-- ========================
  今日のニュース
======================== -->
<section class="news">

  <h2>🔥 今日のニュース</h2>

  <div class="news-cards">

    <div class="news-card">
      <div class="news-img"></div>
      <h3>中国経済が崩れている理由</h3>
      <p>不動産が原因なんだ</p>
    </div>

    <div class="news-card">
      <div class="news-img"></div>
      <h3>原油価格が上昇</h3>
      <p>ガソリン高くなる？</p>
    </div>

    <div class="news-card">
      <div class="news-img"></div>
      <h3>戦争リスク</h3>
      <p>日本に影響</p>
    </div>

  </div>

</section>

</body>
</html>
