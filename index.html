<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLD NEWS TOUR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========================================
       トップページ一番上
  ========================================= -->
  <section class="hero">

    <!-- 背景の上に少し暗い膜 -->
    <div class="hero-overlay"></div>

    <!-- 左の女の子キャラ -->
    <img src="images/yui.png" alt="ユイ" class="hero-yui">

    <!-- 右の男性キャラ -->
    <img src="images/taka.png" alt="タカ" class="hero-taka">

    <!-- 中央のタイトル・説明・ボタン -->
    <div class="hero-content">
      <h1 class="hero-title">WORLD NEWS TOUR</h1>
      <p class="hero-subtitle">世界の出来事をやさしく理解する</p>
      <a href="#news" class="hero-button">世界のニュースを見てみる</a>
    </div>

  </section>

</body>
</html>
