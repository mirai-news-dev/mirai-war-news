<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>戦争と日本経済ニュース｜ミライの漫画解説</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:20px 0;
border-radius:10px;
}

a{
color:#38bdf8;
}
</style>

</head>

<body>

<h1>戦争と日本経済ニュース</h1>
<p>ミライとソウマが世界ニュースを漫画で解説</p>

<div class="card">
<h2>サイト準備中</h2>
<p>ニュース生成システムを準備しています。</p>
</div>

</body>
</html>
<img id="mirai" src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<script>

const mirai = document.getElementById("mirai")

let x = 50

function walk(){

x += 5

if(x > window.innerWidth - 100){
x = 0
}

mirai.style.left = x + "px"

}

setInterval(walk,200)

mirai.style.position="fixed"
mirai.style.bottom="20px"
mirai.style.width="80px"

mirai.onclick = function(){

alert("ミライクイズ！次に世界で起きる大きなニュースは？")

}

</script>
